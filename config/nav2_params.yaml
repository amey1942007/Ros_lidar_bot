# Nav2 parameters tuned for the Ros_lidar_bot differential-drive robot.
# Robot footprint: ~0.50 m long × 0.36 m wide (with safety margin).
# World: 10 × 10 m indoor room with furniture obstacles.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    # map→odom from slam_toolbox lags ~0.6 s on the RPi5 (scan-match latency
    # on 3200-pt DenseBoost scans). Every map-frame TF consumer needs a
    # tolerance above that lag or it fails. Verified live 2026-07-17: with
    # the default (0.1) pose lookups intermittently fail; 1.0 fixed it.
    transform_tolerance: 1.0
    bt_loop_duration: 20
    default_server_timeout: 20
    # plugin_lib_names deliberately NOT set: on Jazzy the default list
    # auto-includes every BT plugin the default behavior trees need. The
    # old Humble-era explicit list here referenced stale libraries and is
    # the classic cause of bt_navigator dying/hanging in on_configure,
    # which wedges the whole lifecycle bringup (servers stay inactive and
    # silently ignore goals).

controller_server:
  ros__parameters:
    use_sim_time: false
    # 15 Hz (was 20): the RPi5 runs SLAM scan-matching + costmaps + control on
    # the same cores. At 20 Hz the controller missed cycles under load
    # ("Control loop missed its desired rate"), velocity_smoother's timeout
    # then zeroed cmd_vel → the classic stop-and-go stutter. 15 Hz leaves CPU
    # headroom while still being far above what RPP needs to track smoothly.
    controller_frequency: 15.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08
      movement_time_allowance: 15.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.50
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.35
      min_approach_linear_velocity: 0.08
      max_angular_accel: 2.0
      max_robot_pose_search_dist: 10.0

      # Lookahead — min raised 0.30 → 0.35: a too-short lookahead makes RPP
      # chase every path wiggle at low speed → weaving/jerky heading.
      lookahead_dist: 0.5
      min_lookahead_dist: 0.35
      max_lookahead_dist: 0.9
      lookahead_time: 1.2
      use_velocity_scaled_lookahead_dist: true

      # Face the path before driving — if heading in map is wrong, the robot
      # otherwise drives "away" from the goal along +X of a bad orientation.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.4
      rotate_to_heading_angular_vel: 1.0

      # 1.0 (was 0.5): map→odom staleness ~0.6 s exceeded 0.5 → path
      # transform threw every cycle → FollowPath aborted within
      # failure_tolerance. Verified live 2026-07-17 via dynamic param.
      transform_tolerance: 1.0

      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.30
      regulated_linear_scaling_min_speed: 0.10

      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 0.5
      allow_reversing: false

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5        # accept goal if within 0.5 m (useful for frontier targets)
      use_astar: true        # A* is more direct than Dijkstra for point-to-point goals
      allow_unknown: true    # must be true — frontiers are at the edge of unknown space

behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
      max_rotational_vel: 1.0
      min_rotational_vel: 0.4
      rotational_acc_lim: 3.2
    backup:
      plugin: "nav2_behaviors::BackUp"
      speed: -0.15      # reverse speed (negative = backward)
      time_allowance: 6.0   # 0.15 × 6 = 0.9 m max backup — enough to clear furniture zones
    wait:
      plugin: "nav2_behaviors::Wait"

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      # Default 0.3 is too tight when the RPi5 is loaded; keep in line with
      # the rest of the stack (see bt_navigator note).
      transform_tolerance: 1.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      # Robot footprint (x forward, y left). Matches URDF dimensions + margin.
      footprint: "[[0.25, 0.18], [0.25, -0.18], [-0.25, -0.18], [-0.25, 0.18]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 5.5
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5    # reduced — only mark obstacles the robot is actually close to
          obstacle_min_range: 0.25   # ignore chassis / mast returns (was blocking local planner)
          observation_keep_time: 0.2
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.28
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # CRITICAL — verified live 2026-07-17: default 0.3 < map→odom lag
      # (~0.6 s), so getRobotPose failed inside the costmap → EVERY
      # ComputePathToPose returned FAILURE → goals aborted after spin
      # recoveries. Raising to 1.0 made planning succeed instantly.
      transform_tolerance: 1.0
      resolution: 0.05
      track_unknown_space: true     # required for frontier-based exploration
      # Robot footprint (same as local)
      footprint: "[[0.25, 0.18], [0.25, -0.18], [-0.25, -0.18], [-0.25, 0.18]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true   # receive map even if subscribed late
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 5.5
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.10
          observation_keep_time: 0.3
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
      always_send_full_costmap: true

# ── Jazzy velocity pipeline ──────────────────────────────────────────────────
# In Jazzy, navigation_launch.py chains the command flow as:
#   controller → cmd_vel_nav → velocity_smoother → cmd_vel_smoothed
#   → collision_monitor → /cmd_vel → safety_stop → /cmd_vel_safe → driver
# Every server below is launched by navigation_launch.py whether configured
# here or not; an unconfigured collision_monitor fails to configure, which
# makes the lifecycle manager abort the WHOLE bringup — all servers then sit
# inactive and silently ignore goals.

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # [x, y, theta]
    max_velocity: [0.5, 0.0, 2.0]
    min_velocity: [-0.5, 0.0, -2.0]
    # Gentle accel = smooth motion. The old 3.5/4.0 passed every controller
    # hiccup straight to the wheels as a jolt; 1.2 m/s² still reaches full
    # 0.35 m/s cruise in ~0.3 s. Decel kept stronger so obstacle/goal stops
    # stay crisp.
    max_accel: [1.2, 0.0, 2.5]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    # 1.0 s (was 0.5): with the controller at 15 Hz, a brief CPU spike could
    # starve cmd_vel for >0.5 s → smoother zeroed output → stop-and-go.
    # driver_node has its own failsafe stop, so this is safe to relax.
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: false
    enabled: true
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # Jazzy uses unstamped Twist on this stack.
    enable_stamped_cmd_vel: false
    # Must have >=1 polygon AND >=1 observation source or the node fails
    # configure / dies → lifecycle leaves bt_navigator "unconfigured".
    # Front-only boxes start at 0.30 m so chassis self-hits do not stop Nav2.
    #
    # Two-stage: the old single 0.30–0.55 m stop box halted the robot dead
    # every time furniture entered it, then Nav2 re-approached → repeated
    # full stops near obstacles. Now the outer zone only slows to 50% and
    # the hard stop is reserved for a genuinely imminent hit (< 0.40 m).
    polygons: ["PolygonSlow", "PolygonStop"]
    PolygonSlow:
      type: "polygon"
      points: "[[0.65, 0.24], [0.65, -0.24], [0.30, -0.24], [0.30, 0.24]]"
      action_type: "slowdown"
      slowdown_ratio: 0.5
      min_points: 4
      visualize: false
      polygon_pub_topic: "polygon_slow"
      enabled: true
    PolygonStop:
      type: "polygon"
      points: "[[0.40, 0.20], [0.40, -0.20], [0.30, -0.20], [0.30, 0.20]]"
      action_type: "stop"
      min_points: 4
      visualize: false
      polygon_pub_topic: "polygon_stop"
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      enabled: true

route_server:
  ros__parameters:
    use_sim_time: false
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"

# No physical dock on this robot — this config only exists so docking_server
# (launched unconditionally by navigation_launch.py) configures cleanly.
docking_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false
      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1
    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    # NOTE: navigation_launch.py passes its own node_names list which overrides
    # this one; kept in sync here for documentation.
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - route_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - collision_monitor
      - docking_server
