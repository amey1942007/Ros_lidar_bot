slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping #localization

    # if you'd like to immediately start continuing a map at a given pose
    # or at the dock, but they are mutually exclusive, if pose is given
    # will use pose
    #map_file_name: test_steve
    map_start_pose: [0.0, 0.0, 0.0]
    #map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    # Publish map→odom as fast as practical so the live scan stays locked while
    # driving (not only after the robot stops).
    transform_publish_period: 0.02
    map_update_frequency: 2.0
    resolution: 0.05
    # RPLidar S2E: spec range 0.05–30 m. Min 0.40 m — bot frame/mast returns
    # sit at ~0.35–0.37 m and must not enter the map or scan matcher.
    # Max capped at 20 m — beyond that indoor returns are sparse/glancing and
    # mostly add noise to the scan matcher; raise toward 30.0 for large halls.
    min_laser_range: 0.4
    # 16.0: the S2E in Standard scan mode reports 16 m max (slam_toolbox
    # warned and clamped when this was 20.0). DenseBoost reports more.
    max_laser_range: 16.0
    # Process scans often enough for smooth map→odom, but not so hard that the
    # RPi 5 starves Nav2 (0.05 = every scan caused stop-and-go driving under
    # nav; the laser_yaw fix removed the need for aggressive re-matching).
    # 0.15 (was 0.08): S2E DenseBoost scans are ~3200 pts at 9 Hz; matching
    # nearly every one kept map→odom ~0.6 s stale and ate the CPU Nav2
    # needs. ~6 Hz matching is still dense at indoor speeds (≤6 cm between
    # matches at 0.35 m/s).
    minimum_time_interval: 0.15
    # Future-dates the published map→odom stamp. 1.0 (was 0.5) covers the
    # scan-match latency so Nav2's TF lookups at "now" succeed; measured
    # staleness was ~0.6 s (see nav2_params.yaml transform_tolerance notes).
    transform_timeout: 1.0
    minimum_travel_distance: 0.0
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000 #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    # 0 = correct heading on every accepted scan (no "rotate then snap" delay).
    minimum_travel_heading: 0.0
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    # Match thresholds back at normal levels: they were loosened to fight the
    # frozen map→odom, whose real cause was the flipped laser_yaw (fixed in
    # lidar.xacro). Loose thresholds now would just let bad matches into the map.
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters - Correlation Parameters
    # 0.5 m search window: the 0.7 used during the laser-flip hunt costs ~2x
    # CPU per scan on the RPi 5 and is unnecessary with sane odom.
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1 

    # Correlation Parameters - Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters — defaults; odom prediction is trustworthy now
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349     
    coarse_search_angle_offset: 0.349   
    coarse_angle_resolution: 0.0349        
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true