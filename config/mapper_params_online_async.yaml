slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping #localization

    # if you'd like to immediately start continuing a map at a given pose
    # or at the dock, but they are mutually exclusive, if pose is given
    # will use pose
    #map_file_name: test_steve
    map_start_pose: [0.0, 0.0, 0.0]
    #map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    # Publish map→odom as fast as practical so the live scan stays locked while
    # driving (not only after the robot stops).
    transform_publish_period: 0.02
    map_update_frequency: 2.0
    resolution: 0.05
    # RPLidar S2E: spec range 0.05–30 m. Keep min at 0.2 m so returns off the
    # robot's own chassis/cables never enter the map. Max capped at 20 m —
    # beyond that indoor returns are sparse/glancing and mostly add noise to
    # the scan matcher; raise toward 30.0 for large open halls.
    min_laser_range: 0.2
    max_laser_range: 20.0
    # Process every scan (~10 Hz S2E) so map→odom keeps correcting while moving.
    minimum_time_interval: 0.05
    transform_timeout: 0.5
    minimum_travel_distance: 0.0
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000 #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    # 0 = correct heading on every accepted scan (no "rotate then snap" delay).
    minimum_travel_heading: 0.0
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    # Lower thresholds so matches still succeed while driving (board WARN was
    # map→odom frozen = matcher rejecting scans until the robot stopped).
    link_match_minimum_response_fine: 0.05
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true 
    loop_match_minimum_chain_size: 10           
    loop_match_maximum_variance_coarse: 3.0  
    loop_match_minimum_response_coarse: 0.30    
    loop_match_minimum_response_fine: 0.40

    # Correlation Parameters - Correlation Parameters
    correlation_search_space_dimension: 0.7
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1 

    # Correlation Parameters - Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters — trust scan a bit more vs noisy odom prediction
    distance_variance_penalty: 0.35
    angle_variance_penalty: 0.7

    fine_search_angle_offset: 0.00349     
    coarse_search_angle_offset: 0.349   
    coarse_angle_resolution: 0.0349        
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true