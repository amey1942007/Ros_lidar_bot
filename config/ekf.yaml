ekf_filter_node:
  ros__parameters:
    # ── Timing ────────────────────────────────────────────────────────────────
    # Run EKF at 30 Hz — fast enough to track 50 Hz IMU, low enough for RPi.
    frequency: 30.0
    sensor_timeout: 1.5       # seconds before a sensor is considered stale
    two_d_mode: true          # flat ground robot — ignore Z, roll, pitch
    use_sim_time: false

    # ── TF output ─────────────────────────────────────────────────────────────
    # EKF publishes odom -> base_footprint transform.
    # odom_node also broadcasts this TF — set broadcast_tf:=false in odom_node
    # launch args so only EKF owns this transform (avoids TF conflicts).
    publish_tf: true

    # ── Frame names ───────────────────────────────────────────────────────────
    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_footprint
    world_frame:     odom

    # ── Source 0: Wheel odometry (/odom_raw from odom_node) ───────────────────
    # odom_node uses RPM from DDSM115 motors via driver_node.
    # Config vector: [X, Y, Z, Roll, Pitch, Yaw, vX, vY, vZ, vRoll, vPitch, vYaw, aX, aY, aZ]
    #
    # We use:
    #   X, Y position  — dead-reckoning absolute position
    #   vX velocity     — forward wheel speed
    #   vYaw            — REMOVED: IMU is more accurate for angular velocity
    #                     (having both causes EKF to fight between sources)
    #
    # We do NOT use:
    #   Yaw from odom  — IMU (BNO055 fusion) is far better for heading
    #   vY             — differential drive has no lateral velocity
    # Velocity-only fusion (standard for diff-drive + robot_localization):
    # the EKF integrates vX/vYaw itself, so its X/Y stays consistent with its
    # own heading. Fusing absolute X/Y here (integrated by odom_node with
    # WHEEL heading) while yaw comes from the GYRO made the filter fight
    # itself — pose jumps that showed up as the scan rotating in RViz.
    odom0: /odom_raw
    odom0_config: [false, false, false,   # X, Y, Z position — EKF integrates velocities itself
                   false, false, false,   # Roll, Pitch, Yaw — from IMU gyro
                   true,  false, false,   # vX (use) | vY (ignore, no lateral) | vZ (ignore)
                   false, false, true,    # vRoll, vPitch (ignore) | vYaw ωz (USE — fused with IMU gyro)
                   false, false, false]   # aX, aY, aZ — ignore
    odom0_differential: false

    # ── Source 1: IMU (/imu from imu_node / BNO055 via Arduino) ──────────────
    # BNO055 in NDOF mode provides fused absolute orientation (quaternion)
    # + raw angular velocity + raw linear acceleration.
    # Config vector: [X, Y, Z, Roll, Pitch, Yaw, vX, vY, vZ, vRoll, vPitch, vYaw, aX, aY, aZ]
    #
    # We use:
    #   Yaw             — absolute heading from BNO055 fusion (best source)
    #   vYaw (ωz)       — gyro angular rate (faster than derived from odometry)
    #   aX              — forward acceleration for velocity estimation
    #
    # We do NOT use:
    #   Roll, Pitch     — two_d_mode ignores them anyway
    #   aY, aZ          — lateral/vertical accel not meaningful for flat robot
    imu0: /imu
    imu0_config: [false, false, false,    # X, Y, Z position — from odom
                  false, false, false,    # Roll, Pitch, Yaw (IGNORE BNO055 absolute quat due to lag/mag interference)
                  false, false, false,    # vX, vY, vZ — from odom
                  false, false, true,     # vRoll, vPitch (ignore) | vYaw ωz (USE — gyro is perfectly accurate)
                  false, false, false]    # aX (disabled to prevent drift) | aY, aZ (ignore)

    # imu0_differential: false — BNO055 gives absolute orientation — do not diff
    #
    # imu0_relative: false — BNO055 NDOF gives a FUSED ABSOLUTE orientation (quaternion).
    # Setting this to true makes robot_localization subtract the first received quaternion
    # at startup. The problem: if the calibration node is spinning the robot when the EKF
    # starts (T=40s), the "first" orientation is mid-rotation → wrong zero → the EKF yaw
    # is permanently offset, causing the LiDAR scan to appear rotated in the map frame.
    # Leave as false; the EKF will use the BNO055 absolute heading directly.
    # The heading at startup will be wherever the robot is facing — SLAM Toolbox will
    # compensate via map→odom and set the map frame correctly from the first scan.
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravity: true             # Subtract 9.81 m/s² from aZ before fusion